<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Wanted �” Лог выдач</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c10;--card:#13131a;--card2:#0f0f17;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --purple:#7c3aed;--purple2:#9d5cf6;--purple3:#c4a0ff;--rose:#c026d3;
  --text:#f0eeff;--muted:#8878aa;--muted2:#5e5580;
  --green:#22c55e;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.bg-blur{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18}
.orb1{width:500px;height:500px;background:var(--purple);top:-160px;left:-100px;animation:drift 18s ease-in-out infinite}
.orb2{width:380px;height:380px;background:var(--rose);bottom:-100px;right:-80px;animation:drift 14s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}

.wrap{max-width:1100px;margin:0 auto;padding:48px 24px 80px;position:relative;z-index:1}

.header{margin-bottom:36px}
.logo{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);margin-bottom:12px}
.logo span{color:var(--purple3)}
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--purple2),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:13px;color:var(--muted)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;text-align:center}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;background:linear-gradient(135deg,var(--purple2),#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13px;font-weight:600;color:var(--text)}
.table-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);padding:2px 8px;border-radius:5px}

table{width:100%;border-collapse:collapse}
thead tr{background:rgba(255,255,255,0.02)}
th{padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(124,58,237,0.04)}

.badge-uk{background:rgba(150,0,24,0.2);color:#ff6b6b;border:1px solid rgba(150,0,24,0.3);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge-ap{background:rgba(26,77,122,0.2);color:#60a5fa;border:1px solid rgba(26,77,122,0.3);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.stars{color:#f0c040}
.art{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--purple3);background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.15);padding:2px 7px;border-radius:4px}
.time-cell{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.nick{font-weight:500;color:var(--text)}
.rec-link{color:var(--purple3);text-decoration:none;font-size:12px;display:inline-flex;align-items:center;gap:4px;opacity:0.7;transition:opacity 0.2s}
.rec-link:hover{opacity:1}
.num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2)}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty svg{opacity:0.3;margin-bottom:12px}
.empty p{font-size:14px}

footer{text-align:center;margin-top:32px}
footer a{font-size:12px;color:var(--muted2);text-decoration:none}
footer a:hover{color:var(--purple3)}
</style>
</head>
<body>

<div class="bg-blur">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="wrap">
  <div class="header">
    <div class="logo">fixed_wanted<span>.lua</span> �” лог выдач</div>
    <h1>История <em>розысков и штрафов</em></h1>
    <p class="header-sub">Все выдачи за текущую сессию · Время московское (МСК)</p>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Всего</div></div>
    <div class="stat"><div class="stat-num" id="stat-uk">0</div><div class="stat-label">УК</div></div>
    <div class="stat"><div class="stat-num" id="stat-ak">0</div><div class="stat-label">КоАП</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="table-title">Журнал выдач</div>
      <div class="table-count" id="entry-count">0 записей</div>
    </div>
    <table>
      <thead>

      </thead>
      <tbody id="log-body">





</tbody>
    </table>
  </div>

  <footer>
    <a href="https://dyletafk.github.io/fixedwanted/">Fixed Wanted — Lua скрипт для Rodina RP</a>
  </footer>
</div>

<script>
// Считаем статистику после загрузки
window.addEventListener('load', function() {
  const rows = document.querySelectorAll('#log-body tr');
  const total = rows.length;
  let uk = 0, ak = 0;
  rows.forEach(function(row) {
    if (row.querySelector('.badge-uk')) uk++;
    if (row.querySelector('.badge-ap')) ak++;
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-uk').textContent = uk;
  document.getElementById('stat-ak').textContent = ak;
  document.getElementById('entry-count').textContent = total + ' ' + (total === 1 ? 'запись' : total < 5 ? 'записи' : 'записей');

  if (total === 0) {
    document.querySelector('tbody').innerHTML = '';
  }
});
</s
